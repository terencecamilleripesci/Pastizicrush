<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pastizzi Crush</title>
<meta name="description" content="A Maltese match-3 game — swap pastizzi, ftira, ġbejna & more. Match 3 to pop!">
<meta name="theme-color" content="#7a1f1f">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pastizzi Crush">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- shared 3D gradients for the food art (referenced by every tile) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe49e"/><stop offset=".5" stop-color="#f3b44c"/><stop offset="1" stop-color="#c2801b"/></linearGradient>
  <linearGradient id="gGold2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd882"/><stop offset="1" stop-color="#c8851f"/></linearGradient>
  <radialGradient id="gRed" cx=".4" cy=".34" r=".8"><stop offset="0" stop-color="#ff7e54"/><stop offset="1" stop-color="#a81f1c"/></radialGradient>
  <radialGradient id="gCream" cx=".4" cy=".32" r=".85"><stop offset="0" stop-color="#fff8d2"/><stop offset="1" stop-color="#e6c049"/></radialGradient>
  <linearGradient id="gBrown" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d99f63"/><stop offset="1" stop-color="#71421d"/></linearGradient>
  <radialGradient id="gPink" cx=".4" cy=".32" r=".85"><stop offset="0" stop-color="#ffc2db"/><stop offset="1" stop-color="#cf5489"/></radialGradient>
  <radialGradient id="gPea" cx=".4" cy=".3" r=".85"><stop offset="0" stop-color="#c4e472"/><stop offset="1" stop-color="#567f28"/></radialGradient>
  <radialGradient id="gGloss" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#fff" stop-opacity=".6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>
</defs></svg>

<button id="snd" class="sndbtn" aria-label="Toggle sound">🔊</button>

<header class="hud">
  <div class="title">Pastizzi&nbsp;<span>Crush</span></div>
  <div class="stats">
    <div class="stat"><small>Level</small><b id="level">1</b></div>
    <div class="stat"><small>Moves</small><b id="moves">20</b></div>
    <div class="stat"><small>Score</small><b id="score">0</b></div>
    <div class="stat"><small>Best</small><b id="best">0</b></div>
  </div>
  <div class="goal">
    <div class="goalbar"><span id="goalfill"></span></div>
    <small id="goaltext">Target 1,000</small>
  </div>
</header>

<main>
  <div id="board" class="board"></div>
</main>

<p class="hint">Tap a tile then a neighbour — or swipe — to swap. Match 3+ in a row or column.</p>

<!-- Level-select map (home screen) -->
<div class="map" id="map">
  <img class="map-logo" src="assets/logo.png" alt="Pastizzi Crush">
  <p class="map-sub">Choose a level</p>
  <div class="map-list" id="mapList"></div>
</div>

<!-- Overlay (win / lose / tip) -->
<div class="overlay hide" id="overlay">
  <div class="panel">
    <div class="emoji" id="ovEmoji">🥟</div>
    <div class="ov-stars hide" id="ovStars"></div>
    <h2 id="ovTitle">Pastizzi Crush</h2>
    <p id="ovText"></p>
    <button class="btn" id="ovBtn">Play</button>
    <button class="btn btn-ghost" id="ovMap">🗺️ Map</button>
  </div>
</div>

<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>

<!-- Install banner (iOS = step guide, Android = real prompt) -->
<div class="install hide" id="install">
  <button class="install-x" id="installX" aria-label="Dismiss">✕</button>
  <span class="install-emoji">📲</span>
  <span id="installMsg" class="install-msg"></span>
  <button class="install-btn" id="installBtn">Install</button>
</div>

<script src="js/lib/confetti.min.js"></script>
<script src="js/game.js"></script>
</body>
</html>
