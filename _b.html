<!doctype html><meta charset=utf-8><pre id="r">…</pre>
<iframe id="f" src="index.html?lvl=1" style="width:460px;height:680px;border:0"></iframe>
<script>
const f=document.getElementById('f'),errs=[];
const tap=(d,el)=>{const w=f.contentWindow,b=el.getBoundingClientRect(),x=b.left+b.width/2,y=b.top+b.height/2;
  el.dispatchEvent(new w.PointerEvent('pointerdown',{clientX:x,clientY:y,bubbles:true}));d.dispatchEvent(new w.PointerEvent('pointerup',{clientX:x,clientY:y,bubbles:true}));};
f.onload=()=>{const w=f.contentWindow,d=f.contentDocument;w.onerror=m=>errs.push(m+'');
 setTimeout(()=>{ d.getElementById('ovBtn').click();
  setTimeout(()=>{ const out={};
    out.coins0=+d.getElementById('gCoins').textContent;
    out.moves0=+d.getElementById('moves').textContent;
    out.boosters=d.querySelectorAll('.boost').length;
    // 1) +5 moves booster
    d.querySelector('.boost[data-b="moves"]').click();
    setTimeout(()=>{
      out.movesAfter=+d.getElementById('moves').textContent;
      out.coinsAfterMoves=+d.getElementById('gCoins').textContent;
      // 2) line booster -> aim then tap a tile
      d.querySelector('.boost[data-b="line"]').click();
      const aiming=d.getElementById('board').classList.contains('aim');
      out.aimOn=aiming;
      const tile=d.querySelector('.tile'); tap(d,tile);
      setTimeout(()=>{
        out.tilesAfter=d.querySelectorAll('.tile').length;
        out.coinsAfterLine=+d.getElementById('gCoins').textContent;
        out.aimCleared=!d.getElementById('board').classList.contains('aim');
        out.errors=errs.slice(0,2);
        document.getElementById('r').textContent=JSON.stringify(out);
        document.title=(out.movesAfter===out.moves0+5 && out.coinsAfterMoves===out.coins0-30 && out.aimOn && out.tilesAfter===64 && out.coinsAfterLine===out.coins0-80 && !errs.length)?'ALLPASS':'HASFAIL';
      },1600);
    },500);
  },1000);
 },500);};
</script>
